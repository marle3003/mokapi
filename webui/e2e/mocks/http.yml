components:
  schemas:
    HttpInfo:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        version:
          type: string
        contact:
          type: object
          properties:
            name:
              type: string
            url:
              type: string
              format: uri
            email:
              type: string
              format: email
        servers:
          type: array
          items:
            type: object
            properties:
              url:
                type: string
              description:
                type: string
        tags:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              summary:
                type: string
              description:
                type: string
              parent:
                type: string
              kind:
                type: string
        paths:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              summary:
                type: string
              description:
                type: string
              status:
                type: string
              errors:
                type: array
                items:
                  $ref: 'common.yml#/components/schemas/Error'
              operations:
                type: array
                items:
                  type: object
                  properties:
                    method:
                      type: string
                    summary:
                      type: string
                    description:
                      type: string
                    operationId:
                      type: string
                    deprecated:
                      type: boolean
                    tags:
                      type: array
                      items:
                        type: string
                    status:
                      type: string
                    errors:
                      type: array
                      items:
                        $ref: 'common.yml#/components/schemas/Error'
                metrics:
                  type: object
                  properties:
                    http_requests_total:
                      type: integer
                    http_requests_errors_total:
                      type: integer
                    request_timestamp:
                      type: integer
    Operation:
      type: object
      properties:
        requestBody:
          type: object
          properties:
            description:
              type: string
            contents:
              type: array
              items:
                $ref: '#/components/schemas/MediaType'
            required:
              type: boolean
        parameters:
          type: array
          items:
            $ref: '#/components/schemas/Parameter'
        responses:
          type: array
          items:
            type: object
            properties:
              statusCode:
                type: [integer, string]
              description:
                type: string
              headers:
                type: array
                items:
                  $ref: '#/components/schemas/Header'
              contents:
                $ref: '#/components/schemas/MediaTypes'
        security:
          type: array
          items:
            type: object
            additionalProperties:
              type: object
              properties:
                scopes:
                  type: array
                  items:
                    type: string
                configs:
                  type: object
    MediaTypes:
      type: array
      items:
        $ref: '#/components/schemas/MediaType'
    MediaType:
      type: object
      properties:
        type:
          type: string
        schema:
          $ref: 'schema.yml#/components/schemas/Schema'
    Parameter:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        description:
          type: string
        required:
          type: boolean
        style:
          type: string
        explode:
          type: boolean
        allowReserved:
          type: boolean
        schema:
          $ref: 'schema.yml#/components/schemas/Schema'
      required: [ name, type, required, deprecated, explode, allowReserved ]
    Header:
      type: object
      properties:
        name:
          type: string
        schema:
          $ref: 'schema.yml#/components/schemas/Schema'
        description:
          type: string
