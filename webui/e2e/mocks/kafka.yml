components:
  pathItems:
    Clusters:
      get:
        summary: Returns a list of Kafka clusters.
        operationId: kafkaClusters
        responses:
          '200':
            description: The list of Kafka clusters
            content:
              application/json:
                schema:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      description:
                        type: string
                      version:
                        type: string
                      contact:
                        $ref: './common.yml#/components/schemas/Contact'
                    additionalProperties: false

    Topics:
      get:
        summary: Returns the list of topics that belongs to the specified Kafka cluster
        operationId: kafkaTopics
        parameters:
          - in: path
            name: cluster
            required: true
            schema:
              type: string
        responses:
          '200':
            description: The list of topics
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/TopicInfo'
    Topic:
      parameters:
        - in: path
          name: cluster
          required: true
          schema:
            type: string
        - in: path
          name: topic
          required: true
          schema:
            type: string
      get:
        summary: Return the topic with the given topic name
        operationId: kafkaTopic
        responses:
          '200':
            description: The topic.
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Topic'
      post:
        summary: Produce messages to a topic, the partition will be chosen randomly
        operationId: kafkaProduceTopic
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items:
                      $ref: '#/components/schemas/Record'
            application/vnd.mokapi.kafka.binary+json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items:
                      $ref: '#/components/schemas/Record'
        responses:
          '200':
            description: List of partitions and offsets the messages were published to.
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    offsets:
                      type: array
                      items:
                        $ref: '#/components/schemas/ProducedRecord'
    Partitions:
      get:
        summary: Return the list of partitions that belong to the specified topic.
        operationId: kafkaPartitions
        parameters:
          - in: path
            name: cluster
            required: true
            schema:
              type: string
          - in: path
            name: topic
            required: true
            schema:
              type: string
        responses:
          '200':
            description: The list of partitions.
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/Partition'
    Partition:
      parameters:
        - in: path
          name: cluster
          required: true
          schema:
            type: string
        - in: path
          name: topic
          required: true
          schema:
            type: string
        - in: path
          name: partitionId
          required: true
          schema:
            type: integer
      get:
        summary: Return the partition with the given partition id.
        operationId: kafkaPartition
        responses:
          '200':
            description: The list of partitions.
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Partition'
      post:
        summary: Produce records to specified partition of the topic.
        operationId: kafkaProducePartition
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items:
                      $ref: '#/components/schemas/Record'
            application/vnd.mokapi.kafka.binary+json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items:
                      $ref: '#/components/schemas/Record'
        responses:
          '200':
            description: List of partitions and offsets the records were published to.
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    offsets:
                      type: array
                      items:
                        $ref: '#/components/schemas/ProducedRecord'
    Offsets:
      parameters:
        - in: path
          name: cluster
          required: true
          schema:
            type: string
        - in: path
          name: topic
          required: true
          schema:
            type: string
        - in: path
          name: partitionId
          required: true
          schema:
            type: integer
      get:
        summary: Return published records in partition.
        operationId: kafkaOffsets
        parameters:
          - in: query
            name: offset
            required: false
            schema:
              type: integer
          - in: query
            name: limit
            required: false
            schema:
              type: integer
              default: 10
        responses:
          '200':
            description: The list of records.
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/Record'
              application/vnd.mokapi.kafka.binary+json:
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/Record'
    Offset:
      parameters:
        - in: path
          name: cluster
          required: true
          schema:
            type: string
        - in: path
          name: topic
          required: true
          schema:
            type: string
        - in: path
          name: partitionId
          required: true
          schema:
            type: integer
        - in: path
          name: offset
          required: true
          schema:
            type: integer
      get:
        summary: Return published record in partition with the specified offset.
        operationId: kafkaOffset
        responses:
          '200':
            description: The record.
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Record'
              application/vnd.mokapi.kafka.binary+json:
                schema:
                  type: object
                  properties:
                    records:
                      type: array
                      items:
                        $ref: '#/components/schemas/Record'
    Group:
      parameters:
        - in: path
          name: cluster
          required: true
          schema:
            type: string
        - in: path
          name: group
          required: true
          schema:
            type: string
      get:
        summary: Return the group with the given group id.
        operationId: kafkaGroup
        responses:
          '200':
            description: The group details.
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Group'
    Client:
      parameters:
        - in: path
          name: cluster
          required: true
          schema:
            type: string
        - in: path
          name: clientId
          required: true
          schema:
            type: string
      get:
        summary: Return the client with the given client id.
        operationId: kafkaClient
        responses:
          '200':
            description: The client details.
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Client'

  schemas:
    KafkaInfo:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        version:
          type: string
        contact:
          type: object
          properties:
            name:
              type: string
            url:
              type: string
              format: uri
            email:
              type: string
              format: email

    Kafka:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        version:
          type: string
        contact:
          type: object
          properties:
            name:
              type: string
            url:
              type: string
              format: uri
            email:
              type: string
              format: email
        servers:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              host:
                type: string
              description:
                type: string
              tags:
                $ref: '#/components/schemas/Tags'
              configs:
                additionalProperties:
                  type: ['number', 'string']
        topics:
          type: array
          items:
            $ref: '#/components/schemas/TopicInfo'
        groups:
          type: array
          items:
            $ref: '#/components/schemas/GroupInfo'
        configs:
          type: array
          items:
            $ref: './common.yml#/components/schemas/ConfigInfo'
    TopicInfo:
      type: object
      properties:
        name:
          type: string
        summary:
          type: string
        lastMessageReceived:
          type: integer
        messages:
          type: integer
    Topic:
      type: object
      properties:
        name:
          type: string
        summary:
          type: string
        partitions:
          type: array
          items:
            $ref: '#/components/schemas/Partition'
        messages:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/MessageConfig'
        bindings:
          $ref: '#/components/schemas/TopicBindings'
        tags:
          $ref: '#/components/schemas/Tags'
    Partition:
      type: object
      properties:
        id:
          type: integer
        startOffset:
          type: integer
        offset:
          type: integer
        leader:
          $ref:  '#/components/schemas/Broker'
        segments:
          type: integer
    GroupInfo:
      type: object
      properties:
        name:
          type: string
        generation:
          type: integer
        state:
          type: string
        protocol:
          type: string
        members:
          type: integer
        metrics:
          type: object
          properties:
            kafka_rebalance_timestamp:
              type: integer
            topics:
              type: object
              additionalProperties:
                type: array
                items:
                  type: object
    Group:
      type: object
      properties:
        name:
          type: string
        generation:
          type: integer
        members:
          type: array
          items:
            $ref: '#/components/schemas/Member'
        coordinator:
          type: string
        leader:
          type: string
        state:
          type: string
        protocol:
          type: string
        topics:
          type: array
          items:
            type: string
        metrics:
          type: object
          properties:
            kafka_rebalance_timestamp:
              type: integer
            topics:
              type: object
              additionalProperties:
                type: array
                items:
                  type: object
    Member:
      type: object
      properties:
        name:
          type: string
        addr:
          type: string
        software:
          type: string
        heartbeat:
          type: integer
        partitions:
          type: object
          additionalProperties:
            type: array
            items:
              type: integer
    Client:
      type: object
      properties:
        clientId:
          type: string
        address:
          type: string
        software:
          type: string
        brokerAddress:
          type: string
        groups:
          type: array
          items:
            type: object
            properties:
              memberId:
                type: string
              group:
                type: string
    Broker:
      type: object
      properties:
        name:
          type: string
        addr:
          type: string
    MessageConfig:
      type: object
      properties:
        name:
          type: string
        title:
          type: string
        summary:
          type: string
        description:
          type: string
        key:
          $ref: 'schema.yml#/components/schemas/Schema'
        payload:
          $ref: 'schema.yml#/components/schemas/Schema'
        header:
          $ref: 'schema.yml#/components/schemas/Schema'
        contentType:
          type: string
    TopicBindings:
      partitions:
        type: integer
      retentionBytes:
        type: integer
      retentionMs:
        type: integer
      segmentBytes:
        type: integer
      segmentMs:
        type: integer
      valueSchemaValidation:
        type: boolean
      keySchemaValidation:
        type: boolean
    Record:
      type: object
      properties:
        offset:
          type: integer
        key: {}
        value: {}
        headers:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              value:
                type: string
        partition:
          type: integer

    ProducedRecord:
      type: object
      properties:
        partition:
          type: integer
        offset:
          type: integer
        error:
          type: string
    Tags:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
          description:
            type: string
